<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Yellow Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        #splash {
            position: fixed;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #000;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        #splash h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 12px;
            font-weight: 800;
            margin-bottom: 30px;
        }

        /* CAMBIO A AMARILLO NEÓN */
        #splash h1 span {
            color: #ffff00; 
            text-shadow: 0 0 15px #ffff00, 0 0 30px #ffd700, 0 0 50px #ffae00;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 15px #ffff00, 0 0 30px #ffd700; 
            }
            20%, 24%, 55% { 
                opacity: 0.4; 
                text-shadow: none; 
            }
        }

        .btn-entrar {
            padding: 15px 45px;
            border: 2px solid #ffff00;
            background: transparent;
            color: #ffff00;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 4px;
            transition: 0.4s;
        }

        .btn-entrar:hover {
            background: #ffff00;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 0, 0.6);
        }

        #main-content {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            padding: 40px;
        }

        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            margin-top: 50px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transition: 0.4s;
        }

        /* HOVER EN AMARILLO */
        .card:hover {
            border-color: #ffff00;
            background: rgba(255, 255, 0, 0.05);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(255, 255, 0, 0.15);
        }

        .card h3 {
            color: #ffff00;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .card p {
            color: #888;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1>Vytex<span>X</span></h1>
        <button class="btn-entrar" onclick="activar()">ENTRAR</button>
    </div>

    <div id="main-content">
        <h2 style="font-size: 2.8rem; margin-bottom: 0;">Unidades de Negocio</h2>
        <p style="color: #444; font-family: monospace;">// VytexX Yellow Protocol // Active</p>

        <div class="grid-servicios">
            <a href="web.html" class="card-link">
                <div class="card">
                    <h3>Web Development</h3>
                    <p>Interfaces disruptivas y optimización de código.</p>
                </div>
            </a>
            <a href="coding.html" class="card-link">
                <div class="card">
                    <h3>Coding</h3>
                    <p>Algoritmos avanzados y automatización.</p>
                </div>
            </a>
            <a href="architecture.html" class="card-link">
                <div class="card">
                    <h3>Architecture</h3>
                    <p>Diseño de infraestructura digital.</p>
                </div>
            </a>
        </div>
    </div>

    <script>
        function activar() {
            const splash = document.getElementById('splash');
            const main = document.getElementById('main-content');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'flex';
                setTimeout(() => { main.style.opacity = '1'; }, 50);
            }, 800);
        }
    </script>
</body>
</html>
