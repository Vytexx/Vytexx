<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Tech Experience</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #splash {
            position: fixed;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #000;
            z-index: 1000;
        }

        .typing-container {
            display: flex;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            letter-spacing: 12px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .char {
            opacity: 0;
            animation: fadeInChar 0.1s forwards;
        }

        @keyframes fadeInChar {
            to { opacity: 1; }
        }

        /* --- LA X QUE SE CAE Y SE QUEDA --- */
        .neon-x {
            color: #ffff00;
            text-shadow: 0 0 15px #ffff00, 0 0 30px #ffd700;
            display: inline-block;
            transform-origin: bottom right;
            /* La animación de parpadeo (flicker) nunca se detiene */
            animation: 
                fadeInChar 0.1s forwards, 
                flicker 1.5s infinite alternate, 
                caidaFisica 1.2s cubic-bezier(0.47, 0, 0.745, 0.715) forwards 2s;
        }

        /* Animación: Se voltea 90 grados y se queda ahí */
        @keyframes caidaFisica {
            0% { transform: rotate(0deg); }
            60% { transform: rotate(95deg); } /* Rebota un poquito más de 90 */
            80% { transform: rotate(88deg); } /* Vuelve */
            100% { transform: rotate(90deg) translateY(10px); } /* Queda perfectamente acostada */
        }

        /* Titileo constante (se mantiene incluso después de caer) */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 15px #ffff00, 0 0 30px #ffd700; 
            }
            20%, 22%, 24%, 55% { 
                opacity: 0.3; 
                text-shadow: none; 
            }
        }

        .btn-entrar {
            opacity: 0;
            padding: 15px 45px;
            border: 2px solid #ffff00;
            background: transparent;
            color: #ffff00;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 4px;
            transition: 0.4s;
            margin-top: 50px;
            animation: fadeInChar 1s forwards 3.2s; /* Aparece después de la caída */
        }

        .btn-entrar:hover {
            background: #ffff00;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 0, 0.6);
        }

        /* Contenido Principal (Igual que antes) */
        #main-content {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transition: 0.4s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .card:hover {
            border-color: #ffff00;
            background: rgba(255, 255, 0, 0.05);
            transform: translateY(-10px);
        }

        .card h3 { color: #ffff00; margin: 0 0 10px 0; }
        .card p { color: #888; margin: 0; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="typing-container">
            <span class="char" style="animation-delay: 0.1s;">V</span>
            <span class="char" style="animation-delay: 0.2s;">y</span>
            <span class="char" style="animation-delay: 0.3s;">t</span>
            <span class="char" style="animation-delay: 0.4s;">e</span>
            <span class="char" style="animation-delay: 0.5s;">x</span>
            <span class="char neon-x">X</span>
        </div>
        <button class="btn-entrar" onclick="activar()">Entrar</button>
    </div>

    <div id="main-content">
        <h2 style="color:#ffff00; font-size: 2.5rem; margin-bottom: 40px;">Unidades de Negocio</h2>
        <div class="grid-servicios">
            <a href="web.html" class="card">
                <h3>Web Development</h3>
                <p>Interfaces disruptivas.</p>
            </a>
            <a href="coding.html" class="card">
                <h3>Coding</h3>
                <p>Algoritmos avanzados.</p>
            </a>
            <a href="architecture.html" class="card">
                <h3>Architecture</h3>
                <p>Infraestructura digital.</p>
            </a>
        </div>
    </div>

    <script>
        function activar() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                setTimeout(() => { document.getElementById('main-content').style.opacity = '1'; }, 50);
            }, 1000);
        }
    </script>
</body>
</html>
