<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Advanced Code Solutions</title>
    <style>
        /* Reset básico y fondo */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505; /* Negro casi puro */
            color: white;
            overflow: hidden;
        }

        /* Pantalla de Bienvenida (Splash Screen) */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 1000;
            transition: opacity 0.8s ease-in-out;
        }

        /* Estilo del Nombre VytexX */
        #splash-screen h1 {
            font-size: clamp(3rem, 10vw, 6rem); /* Tamaño fluido */
            letter-spacing: 12px;
            margin-bottom: 30px;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* La X con Efecto Neón y Titileo */
        #splash-screen h1 span {
            color: #00e5ff; /* Cian Tecnológico */
            text-shadow: 
                0 0 7px #00e5ff,
                0 0 15px #00e5ff,
                0 0 30px #00e5ff,
                0 0 50px #00b8d4;
            animation: flicker 2s infinite alternate;
        }

        /* Animación de parpadeo del Neón */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 
                    0 0 7px #00e5ff,
                    0 0 15px #00e5ff,
                    0 0 30px #00e5ff,
                    0 0 50px #00b8d4;
                opacity: 1;
            }
            20%, 24%, 55% {        
                text-shadow: none;
                opacity: 0.4;
            }
        }

        /* Botón de Entrada Estilo Tech */
        .enter-btn {
            padding: 15px 40px;
            border: 1px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            transition: all 0.4s ease;
            outline: none;
        }

        .enter-btn:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
            transform: translateY(-3px);
        }

        /* Contenido Formal (oculto) */
        #main-content {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #main-content h2 {
            font-size: 2.5rem;
            color: #00e5ff;
        }

        #main-content p {
            color: #888;
            font-family: 'Courier New', Courier, monospace;
        }

    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>Vytex<span>X</span></h1>
        <button class="enter-btn" onclick="entrar()">Entrar</button>
    </div>

    <div id="main-content" style="display: none;">
        <h2>Bienvenidos a VytexX</h2>
        <p>// Ejecutando soluciones tecnológicas...</p>
        <p>// Próximamente: Web Development | Coding | Architecture</p>
    </div>

    <script>
        function entrar() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            
            // Inicia desvanecimiento
            splash.style.opacity = '0';
            
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'flex';
                // Pequeño delay para que la entrada del contenido sea suave
                setTimeout(() => {
                    main.style.opacity = '1';
                }, 50);
                document.body.style.overflow = 'auto';
            }, 800);
        }
    </script>

</body>
</html>
