<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Advanced Code Solutions</title>
    <style>
        /* Reset y Estilos Base */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        /* Pantalla de Bienvenida */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 1000;
            transition: opacity 0.8s ease-in-out;
        }

        #splash-screen h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 12px;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
        }

        #splash-screen h1 span {
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff; }
            20%, 24%, 55% { opacity: 0.4; text-shadow: none; }
        }

        .enter-btn {
            padding: 15px 40px;
            border: 1px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            cursor: pointer;
            letter-spacing: 4px;
            transition: 0.4s;
            font-weight: bold;
        }

        .enter-btn:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
        }

        /* Contenido Principal (Grilla de 3 Cuadros) */
        #main-content {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .services-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            margin-top: 50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #00e5ff;
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2);
        }
