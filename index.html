<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Tech Experience</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #splash {
            position: fixed;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #000;
            z-index: 1000;
        }

        /* Contenedor del nombre para que no se mueva */
        .typing-container {
            display: flex;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            letter-spacing: 12px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Estilo base de cada letra (invisible al inicio) */
        .char {
            opacity: 0;
            animation: fadeInChar 0.1s forwards;
        }

        /* Animación para que aparezcan */
        @keyframes fadeInChar {
            to { opacity: 1; }
        }

        /* La X especial con Neón Amarillo */
        .neon-x {
            color: #ffff00;
            text-shadow: 0 0 15px #ffff00, 0 0 30px #ffd700;
            animation: fadeInChar 0.1s forwards, flicker 2s infinite 1.5s; /* Empieza a titilar después de aparecer */
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 15px #ffff00; }
            20%, 24%, 55% { opacity: 0.4; text-shadow: none; }
        }

        .btn-entrar {
            opacity: 0; /* Oculto hasta que termine de escribir */
            padding: 15px 45px;
            border: 2px solid #ffff00;
            background: transparent;
            color: #ffff00;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 4px;
            transition: 0.4s;
            animation: fadeInChar 1s forwards 1.2s; /* Aparece después de las letras */
        }

        .btn-entrar:hover {
            background: #ffff00;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 0, 0.6);
        }

        /* Estilos del contenido (igual que antes) */
        #main-content {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transition: 0.4s;
        }

        .card:hover {
            border-color: #ffff00;
            background: rgba(255, 255, 0, 0.05);
            transform: translateY(-10px);
        }

        .card h3 { color: #ffff00; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="typing-container">
            <span class="char" style="animation-delay: 0.1s;">V</span>
            <span class="char" style="animation-delay: 0.2s;">y</span>
            <span class="char" style="animation-delay: 0.3s;">t</span>
            <span class="char" style="animation-delay: 0.4s;">e</span>
            <span class="char" style="animation-delay: 0.5s;">x</span>
            <span class="char neon-x" style="animation-delay: 0.7s;">X</span>
        </div>
        <button class="btn-entrar" onclick="activar()">Entrar</button>
    </div>

    <div id="main-content">
        <h2 style="color:#ffff00;">Unidades de Negocio</h2>
        <div class="grid-servicios">
            <div class="card"><h3>Web Development</h3><p>Interfaces disruptivas.</p></div>
            <div class="card"><h3>Coding</h3><p>Algoritmos avanzados.</p></div>
            <div class="card"><h3>Architecture</h3><p>Infraestructura digital.</p></div>
        </div>
    </div>

    <script>
        function activar() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                setTimeout(() => { document.getElementById('main-content').style.opacity = '1'; }, 50);
            }, 800);
        }
    </script>
</body>
</html>
