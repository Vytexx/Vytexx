<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Code & Solutions</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow: hidden; /* Evita el scroll en la bienvenida */
        }

        /* Pantalla de Bienvenida (Splash Screen) */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        #splash-screen h1 {
            font-size: 5rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

      #splash-screen h1 span {
    color: #00e5ff;
    text-shadow: 
        0 0 5px #00e5ff,
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 40px #0081a7; /* Brillo de fondo */
    animation: titileo 1.5s infinite alternate;
}

/* La magia del titileo */
@keyframes titileo {
    0%, 100% {
        opacity: 1;
    }
    33% {
        opacity: 0.8;
    }
    66% {
        opacity: 1;
    }
    67% {
        opacity: 0.2; /* El "fallo" del neón */
    }
    68% {
        opacity: 1;
    }
}

        .enter-btn {
            padding: 12px 30px;
            border: 2px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            cursor: pointer;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 20px #00e5ff;
        }

        /* Contenido de la página formal (oculto al inicio) */
        #main-content {
            display: none;
            padding: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>Vytex<span>X</span></h1>
        <button class="enter-btn" onclick="entrar()">Entrar</button>
    </div>

    <div id="main-content">
        <h2>Bienvenido a la plataforma formal de VytexX</h2>
        <p>Aquí es donde las soluciones de código cobran vida.</p>
        <p>// Próximamente: Portfolio, Servicios y Contacto.</p>
    </div>

    <script>
        function entrar() {
            // Animación para desaparecer la bienvenida
            document.getElementById('splash-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.body.style.overflow = 'auto'; // Habilita el scroll
            }, 800);
        }
    </script>

</body>
</html>
