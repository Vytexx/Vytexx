<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Soluciones Tecnológicas</title>
    <style>
        /* Fondo y Base */
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* Pantalla de Bienvenida (Splash) */
        #splash {
            position: fixed;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #000;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        #splash h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 12px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* La X de Neón con Titileo */
        #splash h1 span {
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff, 0 0 50px #00b8d4;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff; 
            }
            20%, 24%, 55% { 
                opacity: 0.4; 
                text-shadow: none; 
            }
        }

        .btn-entrar {
            padding: 15px 45px;
            border: 2px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 4px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-entrar:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

        /* Contenido Principal después de entrar */
        #main-content {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            padding: 40px;
        }

        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            margin-top: 50px;
        }

        /* Ruteo de los Cuadros */
        .card-link {
            text-decoration: none;
            color: inherit;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
        }

        .card:hover {
            border-color: #00e5ff;
            background: rgba(0, 229, 255, 0.07);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 229, 255, 0.2);
        }

        .card h3 {
            color: #00e5ff;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .card p {
            color: #888;
            line-height: 1.6;
        }

        .card::after {
            content: ">>";
            display: block;
            margin-top: 15px;
            font-family: monospace;
            color: #00e5ff;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1>Vytex<span>X</span></h1>
        <button class="btn-entrar" onclick="activar()">Entrar</button>
    </div>

    <div id="main-content">
        <h2 style="font-size: 2.5rem; margin-bottom: 0;">Unidades de Negocio</h2>
        <p style="color: #444; font-family: monospace;">// VytexX Advanced Systems // Status: Online</p>

        <div class="grid-servicios">
            
            <a href="web.html" class="card-link">
                <div class="card">
                    <h3>Web Development</h3>
                    <p>Desarrollo de interfaces modernas y optimización de código.</p>
                </div>
            </a>

            <a href="coding.html" class="card-link">
                <div class="card">
                    <h3>Coding</h3>
                    <p>Automatización inteligente y lógica de software avanzada.</p>
                </div>
            </a>

            <a href="architecture.html" class="card-link">
                <div class="card">
                    <h3>Architecture</h3>
                    <p>Estructuración de sistemas escalables y diseño de datos.</p>
                </div>
            </a>

        </div>
    </div>

    <script>
        function activar() {
            const splash = document.getElementById('splash');
            const main = document.getElementById('main-content');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'flex';
                setTimeout(() => { main.style.opacity = '1'; }, 50);
            }, 800);
        }
    </script>
</body>
</html>
