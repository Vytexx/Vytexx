
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VytexX | Web Development</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Cabecera con Neón */
        header {
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        h1 span {
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff;
        }

        /* Contenido de la sección */
        .container {
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        .tech-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .tech-item {
            border: 1px solid #333;
            padding: 15px 25px;
            border-radius: 8px;
            font-family: monospace;
            background: rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        .tech-item:hover {
            border-color: #00e5ff;
            color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* Botón Volver */
        .btn-back {
            margin-top: 50px;
            text-decoration: none;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: 0.4s;
        }

        .btn-back:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <header>
        <h1>Web <span>Development</span></h1>
        <p style="color: #666;">// Soluciones Front-end y Back-end de alto nivel //</p>
    </header>

    <div class="container">
        <p>En <strong>VytexX</strong> construimos interfaces que no solo se ven bien, sino que están optimizadas para la velocidad y la experiencia del usuario.</p>
        
        <div class="tech-list">
            <div class="tech-item">HTML5 / CSS3</div>
            <div class="tech-item">JavaScript</div>
            <div class="tech-item">React / Next.js</div>
            <div class="tech-item">UI/UX Design</div>
        </div>

        <a href="index.html" class="btn-back">← VOLVER AL INICIO</a>
    </div>

</body>
</html>
